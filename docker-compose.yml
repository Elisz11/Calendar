services:
  nginx:
    image: nginx:latest
    container_name: calendar_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:${APP_PORT:-80}"
    environment:
      - NGINX_PORT=${APP_PORT:-80}
      - NGINX_SSL_PORT=443
      - API_HOST=api
      - API_PORT=5000
      - SSL_CERT_PATH=/etc/nginx/certs/cert.pem
      - SSL_KEY_PATH=/etc/nginx/certs/key.pem
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - api
    networks:
      - api

  api:
    build: ./backend
    container_name: calendar_api
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - db
      - api

  db:
    image: postgres:18
    container_name: calendar_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - db

networks:
  db:
    driver: bridge
  nginx:
    driver: bridge
  api:
    driver: bridge

volumes:
  db_data:
    driver: local